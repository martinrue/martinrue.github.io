      const TWITTER_EPOCH_MS = 1288834974657;
      const TWITTER_ID_TIME_DIVISOR = 4194304;

      function extractTweetId(url) {
        const match = url.match(/status\/(\d+)/);
        return match ? match[1] : null;
      }

      function dateFromTweetId(tweetId) {
        const id = Number(tweetId);
        const timestampMs =
          Math.floor(id / TWITTER_ID_TIME_DIVISOR) + TWITTER_EPOCH_MS;
        return new Date(timestampMs);
      }

      function monthKeyFromDate(date) {
        const year = date.getUTCFullYear();
        const month = String(date.getUTCMonth() + 1).padStart(2, "0");
        return `${year}-${month}`;
      }

      function monthLabelFromDate(date) {
        return new Intl.DateTimeFormat("en-US", {
          month: "long",
          timeZone: "UTC",
        }).format(date);
      }

      const tweets = tweetUrls
        .map((url) => {
          const id = extractTweetId(url);
          if (!id) return null;
          const date = dateFromTweetId(id);
          return {
            id,
            monthKey: monthKeyFromDate(date),
            monthLabel: monthLabelFromDate(date),
          };
        })
        .filter(Boolean);

      const grid = document.getElementById("tweet-grid");
      const monthJumps = document.getElementById("month-jumps");
      const priorityQueue = [];
      const normalQueue = [];
      const maxConcurrentLoads = 4;
      let inflightLoads = 0;

      function isNearViewport(element) {
        const rect = element.getBoundingClientRect();
        return rect.top < window.innerHeight + 400 && rect.bottom > -200;
      }

      function enqueueSlot(slot, highPriority = false) {
        if (!slot) return;
        if (slot.dataset.loaded === "true") return;
        if (slot.dataset.queued === "true") {
          if (highPriority) {
            const index = normalQueue.indexOf(slot);
            if (index !== -1) {
              normalQueue.splice(index, 1);
              priorityQueue.push(slot);
            }
          }
          return;
        }

        slot.dataset.queued = "true";
        if (highPriority) {
          priorityQueue.push(slot);
        } else {
          normalQueue.push(slot);
        }
      }

      function createCard(tweetId) {
        const card = document.createElement("article");
        card.className = "tweet-card";

        const slot = document.createElement("div");
        slot.className = "tweet-slot";
        slot.dataset.tweetId = tweetId;
        slot.textContent = "...";

        card.appendChild(slot);
        return card;
      }

      function createMonthDivider(label) {
        const divider = document.createElement("div");
        divider.className = "month-divider";
        divider.textContent = label;
        return divider;
      }

      function createMonthJump(label, key) {
        const jump = document.createElement("button");
        jump.type = "button";
        jump.className = "month-jump";
        jump.dataset.targetMonth = key;
        jump.textContent = label;
        return jump;
      }

      function processQueue() {
        if (!window.twttr || !window.twttr.widgets) return;

        while (inflightLoads < maxConcurrentLoads && (priorityQueue.length > 0 || normalQueue.length > 0)) {
          const slot = priorityQueue.length > 0 ? priorityQueue.shift() : normalQueue.shift();
          if (!slot || slot.dataset.loaded === "true") continue;

          const tweetId = slot.dataset.tweetId;
          if (!tweetId) continue;

          slot.dataset.queued = "false";
          slot.dataset.loaded = "true";
          slot.textContent = "";
          inflightLoads += 1;

          window.twttr.widgets
            .createTweet(tweetId, slot, { theme: "dark", dnt: true })
            .catch(() => {
              slot.innerHTML = '<a href="https://x.com/i/web/status/' + tweetId + '" target="_blank" rel="noopener">View tweet</a>';
            })
            .finally(() => {
              inflightLoads -= 1;
              processQueue();
            });
        }
      }

      function startLazyLoading() {
        const observer = new IntersectionObserver(
          (entries) => {
            for (const entry of entries) {
              if (!entry.isIntersecting) continue;

              const slot = entry.target;
              observer.unobserve(slot);
              enqueueSlot(slot, isNearViewport(slot));
            }

            processQueue();
          },
          { root: null, rootMargin: "1200px 0px", threshold: 0.01 },
        );

        let previousMonthKey = null;

        for (const tweet of tweets) {
          if (tweet.monthKey !== previousMonthKey) {
            const divider = createMonthDivider(tweet.monthLabel);
            divider.id = `month-${tweet.monthKey}`;
            grid.appendChild(divider);
            monthJumps.appendChild(createMonthJump(tweet.monthLabel, tweet.monthKey));
            previousMonthKey = tweet.monthKey;
          }

          const card = createCard(tweet.id);
          const slot = card.firstElementChild;
          grid.appendChild(card);
          observer.observe(slot);
        }

        function prioritizeVisibleSlots() {
          const slots = Array.from(grid.querySelectorAll(".tweet-slot"));
          for (const slot of slots) {
            if (isNearViewport(slot)) {
              enqueueSlot(slot, true);
            }
          }
          processQueue();
        }

        monthJumps.addEventListener("click", (event) => {
          const jump = event.target.closest(".month-jump");
          if (!jump) return;

          const targetKey = jump.dataset.targetMonth;
          if (!targetKey) return;

          const target = document.getElementById(`month-${targetKey}`);
          if (!target) return;

          target.scrollIntoView({ block: "start" });
          requestAnimationFrame(prioritizeVisibleSlots);
          setTimeout(prioritizeVisibleSlots, 120);
        });
      }

      function whenWidgetsReady(callback) {
        if (window.twttr && window.twttr.ready) {
          window.twttr.ready(callback);
          return;
        }

        const timer = setInterval(() => {
          if (window.twttr && window.twttr.ready) {
            clearInterval(timer);
            window.twttr.ready(callback);
          }
        }, 100);
      }

      whenWidgetsReady(startLazyLoading);
    </script>
  </body>
</html>
